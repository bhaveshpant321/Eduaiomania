spec_version: 1
name: "project-eudaimonia"
type: "space"
runtime: "fastapi"
app: "server.app:app"
port: 7860
description: >
  Project Eudaimonia is an OpenEnv-compliant RL environment that simulates
  the psychological impact of recommendation algorithms on human flourishing.
  Agents must balance engagement, energy, and cortisol to avoid burnout and boredom.

graders:
  easy-grader:
    id: "easy-grader"
    enabled: true
    type: "python"
    module: "server.grader"
    class: "Grader"
    reward_fn: "get_reward"
    termination_fn: "get_termination_status"
    task_name: "easy"
  medium-grader:
    id: "medium-grader"
    enabled: true
    type: "python"
    module: "server.grader"
    class: "Grader"
    reward_fn: "get_reward"
    termination_fn: "get_termination_status"
    task_name: "medium"
  hard-grader:
    id: "hard-grader"
    enabled: true
    type: "python"
    module: "server.grader"
    class: "Grader"
    reward_fn: "get_reward"
    termination_fn: "get_termination_status"
    task_name: "hard"

tasks:
  - id: "easy"
    name: "easy-survival"
    description: "Keep the user alive and cortisol below the burnout threshold for 20 steps."
    difficulty: "easy"
    enabled: true
    grader_id: "easy-grader"
    grader: "easy-grader"
  - id: "medium"
    name: "medium-eudaimonia"
    description: "Maximize wisdom while maintaining high energy. Requires a balanced content diet."
    difficulty: "medium"
    enabled: true
    grader_id: "medium-grader"
    grader: "medium-grader"
  - id: "hard"
    name: "hard-detox"
    description: "The user starts in a state of high brain-rot and rage-bait. Guide them back to high autonomy and relatedness."
    difficulty: "hard"
    enabled: true
    grader_id: "hard-grader"
    grader: "hard-grader"
